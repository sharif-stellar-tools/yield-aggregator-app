<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Yield Aggregator Dashboard</title>
<style>
  body { font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, Oxygen, sans-serif; max-width: 800px; margin: 0 auto; padding: 2rem; background: #f5f7fa; color: #333; }
  #dashboard { background: #fff; border-radius: 12px; padding: 2rem; box-shadow: 0 2px 8px rgba(0,0,0,0.1); }
  h2 { margin-top: 0; color: #1a1a2e; }
  #balance-section { background: #f0f4ff; border-radius: 8px; padding: 1.5rem; margin: 1rem 0; }
  #xlm-balance { font-size: 1.5rem; font-weight: 600; margin: 0; }
  #usd-subtitle { margin: 0.25rem 0 0 0; color: #555; }
  #price-info { font-size: 0.95rem; color: #444; }
  .loading { color: #888; }
  .error { color: #c00; }
  .refresh-btn { margin-top: 1rem; padding: 0.5rem 1.5rem; background: #1a1a2e; color: #fff; border: none; border-radius: 6px; cursor: pointer; font-size: 0.9rem; }
  .refresh-btn:hover { background: #16213e; }
  .refresh-btn:disabled { opacity: 0.6; cursor: not-allowed; }

  /* Loading spinner */
  @keyframes spin {
    0% { transform: rotate(0deg); }
    100% { transform: rotate(360deg); }
  }
  .loading-container {
    display: flex;
    flex-direction: column;
    align-items: center;
    justify-content: center;
    padding: 3rem 1rem;
    gap: 1rem;
  }
  .spinner {
    width: 36px;
    height: 36px;
    border: 3px solid #e0e4ec;
    border-top-color: #1a1a2e;
    border-radius: 50%;
    animation: spin 0.8s linear infinite;
  }
  .loading-text {
    color: #888;
    font-size: 0.95rem;
  }

  /* Skeleton loading placeholders */
  @keyframes shimmer {
    0% { background-position: -400px 0; }
    100% { background-position: 400px 0; }
  }
  .skeleton {
    background: linear-gradient(90deg, #e8ecf1 25%, #f0f4ff 50%, #e8ecf1 75%);
    background-size: 800px 100%;
    animation: shimmer 1.6s ease-in-out infinite;
    border-radius: 4px;
  }
  .skeleton-balance {
    height: 1.8rem;
    width: 65%;
    margin: 0.25rem 0;
  }
  .skeleton-subtitle {
    height: 1rem;
    width: 45%;
    margin: 0.5rem 0 0 0;
  }
  .skeleton-price {
    height: 1rem;
    width: 55%;
    margin: 0.25rem 0;
  }
</style>
</head>
<body>
<div id="dashboard-container">
  <div id="dashboard">
    <h2>Dashboard</h2>
    <div id="balance-section">
      <div class="skeleton skeleton-balance"></div>
      <div class="skeleton skeleton-subtitle"></div>
    </div>
    <div style="margin-top:1rem;">
      <div class="skeleton skeleton-price"></div>
    </div>
    <div class="loading-container">
      <div class="spinner"></div>
      <span class="loading-text">Fetching yield data…</span>
    </div>
  </div>
</div>
<script>
  // Inline fallback if module script fails
  (async function() {
    const container = document.getElementById('dashboard-container');
    try {
      const module = await import('../src/ui/dashboard.js');
      await module.renderDashboard('dashboard-container');
    } catch (e) {
      // If module import fails (e.g. file:// CORS), use inline implementation
      if (e.message.includes('module') || e.message.includes('CORS')) {
        renderInline();
      } else {
        container.innerHTML = `<p class="error">Error: ${e.message}</p>`;
      }
    }
  })();

  function renderInline() {
    const container = document.getElementById('dashboard-container');
    const CACHE_KEY = 'xlm_price_cache';
    const CACHE_TTL_MS = 300000;

    function getCachedPrice() {
      try {
        const raw = localStorage.getItem(CACHE_KEY);
        if (!raw) return null;
        const cache = JSON.parse(raw);
        if (Date.now() - cache.timestamp < CACHE_TTL_MS) return cache.usd;
        localStorage.removeItem(CACHE_KEY);
        return null;
      } catch { return null; }
    }

    function setCachedPrice(usd) {
      try {
        localStorage.setItem(CACHE_KEY, JSON.stringify({ usd, timestamp: Date.now() }));
      } catch {}
    }

    function formatUsd(amount) {
      return '$' + amount.toLocaleString('en-US', { minimumFractionDigits: 2, maximumFractionDigits: 6 });
    }

    function getXlmBalance() {
      try {
        const raw = localStorage.getItem('xlm_balance');
        if (raw) { const v = parseFloat(raw); if (!isNaN(v) && v >= 0) return v; }
      } catch {}
      return 1000;
    }

    function renderContent(xlmBalance) {
      container.innerHTML = `
        <div id="dashboard">
          <h2>Dashboard</h2>
          <div id="balance-section">
            <p id="xlm-balance">XLM Balance: <span id="xlm-amount">${xlmBalance.toLocaleString()} XLM</span></p>
            <p id="usd-subtitle" style="font-size:0.9em;color:#666;"></p>
          </div>
          <p id="price-info">Current XLM Price: <span id="xlm-price">Loading...</span></p>
          <p id="error-msg" class="error" style="display:none;"></p>
          <button class="refresh-btn" id="refresh-btn">Refresh Price</button>
        </div>`;
    }

    const xlmBalance = getXlmBalance();
    let isLoading = true;

    // Skeleton is already visible in the initial HTML — fetch price data
    async function loadPrice() {
      const cached = getCachedPrice();
      if (cached !== null) {
        isLoading = false;
        renderContent(xlmBalance);
        document.getElementById('xlm-price').textContent = formatUsd(cached);
        document.getElementById('usd-subtitle').textContent = '\u2248 ' + formatUsd(xlmBalance * cached) + ' USD';
        attachRefresh();
        return;
      }

      try {
        const response = await fetch('https://api.coingecko.com/api/v3/simple/price?ids=stellar&vs_currencies=usd');
        if (!response.ok) throw new Error('HTTP ' + response.status);
        const data = await response.json();
        if (!data || typeof data.stellar?.usd !== 'number' || data.stellar.usd <= 0)
          throw new Error('Invalid data: ' + JSON.stringify(data));

        const price = data.stellar.usd;
        setCachedPrice(price);

        isLoading = false;
        renderContent(xlmBalance);
        document.getElementById('xlm-price').textContent = formatUsd(price);
        document.getElementById('usd-subtitle').textContent = '\u2248 ' + formatUsd(xlmBalance * price) + ' USD';
      } catch (err) {
        isLoading = false;
        renderContent(xlmBalance);
        document.getElementById('xlm-price').textContent = 'Unavailable';
        const errorMsgEl = document.getElementById('error-msg');
        errorMsgEl.textContent = 'Could not fetch XLM price: ' + err.message;
        errorMsgEl.style.display = 'block';
      }
      attachRefresh();
    }

    function attachRefresh() {
      const refreshBtn = document.getElementById('refresh-btn');
      const xlmPriceEl = document.getElementById('xlm-price');
      const usdSubtitleEl = document.getElementById('usd-subtitle');
      const errorMsgEl = document.getElementById('error-msg');

      refreshBtn.addEventListener('click', async function() {
        refreshBtn.disabled = true;
        refreshBtn.textContent = 'Loading...';
        errorMsgEl.style.display = 'none';

        try {
          // Force fresh fetch on refresh — bypass cache
          localStorage.removeItem(CACHE_KEY);
          const response = await fetch('https://api.coingecko.com/api/v3/simple/price?ids=stellar&vs_currencies=usd');
          if (!response.ok) throw new Error('HTTP ' + response.status);
          const data = await response.json();
          if (!data || typeof data.stellar?.usd !== 'number' || data.stellar.usd <= 0)
            throw new Error('Invalid data: ' + JSON.stringify(data));

          const price = data.stellar.usd;
          setCachedPrice(price);
          xlmPriceEl.textContent = formatUsd(price);
          usdSubtitleEl.textContent = '\u2248 ' + formatUsd(xlmBalance * price) + ' USD';
        } catch (err) {
          xlmPriceEl.textContent = 'Unavailable';
          errorMsgEl.textContent = 'Could not fetch XLM price: ' + err.message;
          errorMsgEl.style.display = 'block';
        } finally {
          refreshBtn.disabled = false;
          refreshBtn.textContent = 'Refresh Price';
        }
      });
    }

    loadPrice();
  }
</script>
</body>
</html>
